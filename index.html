<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>open_35x_each</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; cursor: pointer; }
        #status { position: fixed; bottom: 10px; left: 10px; color: #0f0; font-family: monospace; background: #000; padding: 5px; z-index: 9999; }
    </style>
</head>
<body>
    <div id="status">Click anywhere to open GitHub 35x + TikTok 35x</div>
    <script>
        (function() {
            const statusDiv = document.getElementById('status');
            const GITHUB_URL = 'https://github.com/mewo010';
            const TIKTOK_URL = 'https://www.tiktok.com/@starmax_cat?_r=1&_t=ZS-97COJgvQrvp';
            const TIMES = 35;

            function openUrls() {
                let githubOpened = 0;
                let tiktokOpened = 0;
                let total = TIMES * 2;

                statusDiv.innerText = `Opening GitHub ${TIMES}x + TikTok ${TIMES}x... 0/${total}`;

                // Open GitHub 35 times
                for (let i = 0; i < TIMES; i++) {
                    setTimeout((idx) => {
                        const win = window.open(GITHUB_URL, `github_${idx}_${Date.now()}`, 
                            'width=1200,height=800,toolbar=yes,menubar=yes,location=yes,status=yes');
                        if (win) {
                            githubOpened++;
                            statusDiv.innerText = `GitHub: ${githubOpened}/${TIMES} | TikTok: ${tiktokOpened}/${TIMES} | Total: ${githubOpened + tiktokOpened}/${total}`;
                        } else {
                            statusDiv.innerText = `POPUP BLOCKED - opened ${githubOpened + tiktokOpened}/${total}. Allow popups.`;
                        }
                    }, i * 80, i);
                }

                // Open TikTok 35 times (more times as requested)
                for (let i = 0; i < TIMES; i++) {
                    setTimeout((idx) => {
                        const win = window.open(TIKTOK_URL, `tiktok_${idx}_${Date.now()}`, 
                            'width=450,height=800,toolbar=yes,menubar=yes,location=yes,status=yes');
                        if (win) {
                            tiktokOpened++;
                            statusDiv.innerText = `GitHub: ${githubOpened}/${TIMES} | TikTok: ${tiktokOpened}/${TIMES} | Total: ${githubOpened + tiktokOpened}/${total}`;
                            
                            // Focus to ensure visibility
                            win.focus();
                        } else {
                            statusDiv.innerText = `POPUP BLOCKED - opened ${githubOpened + tiktokOpened}/${total}. Allow popups.`;
                        }
                    }, i * 80 + 40, i);  // Slight offset from GitHub opens
                }

                // Final status update after all attempts
                setTimeout(() => {
                    statusDiv.innerText = `COMPLETE: GitHub ${githubOpened}/${TIMES} | TikTok ${tiktokOpened}/${TIMES} | Total: ${githubOpened + tiktokOpened}/${total}`;
                }, TIMES * 80 + 2000);
            }

            // Also create backup iframes for TikTok to ensure audio/video loads
            function backupIframes() {
                setTimeout(() => {
                    for (let i = 0; i < TIMES; i++) {
                        const iframe = document.createElement('iframe');
                        iframe.src = TIKTOK_URL;
                        iframe.style.position = 'absolute';
                        iframe.style.top = '-9999px';
                        iframe.style.left = '-9999px';
                        iframe.style.width = '1px';
                        iframe.style.height = '1px';
                        iframe.style.opacity = '0';
                        document.body.appendChild(iframe);
                    }
                    statusDiv.innerText = statusDiv.innerText + ' + 35 background iframes';
                }, 3000);
            }

            // Trigger on click
            document.body.addEventListener('click', function() {
                openUrls();
                backupIframes();
                document.body.style.cursor = 'default';
            });
        })();
    </script>
</body>
</html>
